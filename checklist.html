
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.wrap { padding: 1rem 0; }
.top-bar { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 10px; margin-bottom: 1.5rem; }
.stat { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px 14px; text-align: center; }
.stat-num { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
.stat-label { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }
.progress-bar-wrap { background: var(--color-background-secondary); border-radius: 99px; height: 8px; margin-bottom: 1.5rem; overflow: hidden; }
.progress-bar-fill { height: 8px; border-radius: 99px; background: #1D9E75; transition: width 0.4s; }
.phase { margin-bottom: 1.2rem; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; }
.phase-header { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--color-background-secondary); cursor: pointer; user-select: none; }
.phase-tag { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 99px; }
.phase-title { font-size: 14px; font-weight: 500; color: var(--color-text-primary); flex: 1; }
.phase-meta { font-size: 12px; color: var(--color-text-secondary); }
.phase-chevron { font-size: 12px; color: var(--color-text-tertiary); transition: transform 0.2s; }
.phase-body { padding: 8px 0; }
.task-row { display: flex; align-items: flex-start; gap: 10px; padding: 7px 14px; cursor: pointer; }
.task-row:hover { background: var(--color-background-secondary); }
.checkbox { width: 16px; height: 16px; min-width: 16px; border-radius: 4px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); display: flex; align-items: center; justify-content: center; margin-top: 2px; }
.checkbox.done { background: #1D9E75; border-color: #1D9E75; }
.checkmark { color: #fff; font-size: 10px; font-weight: 700; }
.task-text { font-size: 13px; color: var(--color-text-primary); line-height: 1.5; }
.task-text.done { text-decoration: line-through; color: var(--color-text-tertiary); }
.task-badge { font-size: 10px; padding: 1px 6px; border-radius: 99px; margin-left: 6px; white-space: nowrap; }
.badge-urgent { background: #FCEBEB; color: #A32D2D; }
.badge-ml { background: #EEEDFE; color: #3C3489; }
.badge-cv { background: #E1F5EE; color: #0F6E56; }
.badge-ui { background: #E6F1FB; color: #0C447C; }
.badge-api { background: #FAEEDA; color: #854F0B; }
.badge-report { background: #F1EFE8; color: #5F5E5A; }
.badge-demo { background: #FBEAF0; color: #993556; }
.divider { height: 0.5px; background: var(--color-border-tertiary); margin: 4px 14px; }
</style>
<div class="wrap">
  <div class="top-bar">
    <div class="stat"><div class="stat-num" id="s-done">0</div><div class="stat-label">Done</div></div>
    <div class="stat"><div class="stat-num" id="s-left">0</div><div class="stat-label">Remaining</div></div>
    <div class="stat"><div class="stat-num">13</div><div class="stat-label">Days left</div></div>
    <div class="stat"><div class="stat-num" id="s-pct">0%</div><div class="stat-label">Progress</div></div>
  </div>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="prog" style="width:0%"></div></div>

  <div id="phases"></div>
</div>

<script>
const phases = [
  {
    label: "Day 1–2", color: "#E6F1FB", textColor: "#0C447C", title: "Foundation & Setup",
    dates: "Mar 25–26",
    tasks: [
      { text: "Register for competition TODAY", badge: "urgent" },
      { text: "Pay registration fee (Rs. 250)", badge: "urgent" },
      { text: "Finalise team (max 4 members)", badge: "urgent" },
      { text: "Create GitHub repository with folder structure", badge: null },
      { text: "Install all libraries: scikit-learn, ultralytics, streamlit, pyttsx3, plotly, torch", badge: null },
      { text: "Download Kaggle road accident dataset (US or India)", badge: "ml" },
      { text: "Draw system architecture diagram", badge: "report" },
      { text: "Write literature survey section for report", badge: "report" },
    ]
  },
  {
    label: "Day 3–4", color: "#EEEDFE", textColor: "#3C3489", title: "Accident Prediction Module",
    dates: "Mar 27–28",
    tasks: [
      { text: "Load & clean accident CSV dataset", badge: "ml" },
      { text: "Feature engineering: road type, speed zone, turn angle, time of day, weather", badge: "ml" },
      { text: "Train Random Forest / Extra Trees classifier", badge: "ml" },
      { text: "Target ≥85% test accuracy", badge: "ml" },
      { text: "Plot feature importance chart (XAI — needed for report)", badge: "ml" },
      { text: "Save trained model as .pkl file", badge: "ml" },
      { text: "Identify top 5 'black spot' patterns from data", badge: "ml" },
    ]
  },
  {
    label: "Day 5–6", color: "#E1F5EE", textColor: "#0F6E56", title: "Smart Signal Control",
    dates: "Mar 29–30",
    tasks: [
      { text: "Simulate 4-way intersection state in Python", badge: null },
      { text: "Implement density-based green light duration logic", badge: "ml" },
      { text: "Log delay comparison: fixed-time vs density-based (show ~31% improvement)", badge: "ml" },
      { text: "Optional: Basic Q-learning RL agent if time allows", badge: "ml" },
      { text: "Create animated signal widget for dashboard", badge: "ui" },
    ]
  },
  {
    label: "Day 7", color: "#FAEEDA", textColor: "#854F0B", title: "Weather Integration",
    dates: "Mar 31",
    tasks: [
      { text: "Create free OpenWeatherMap API account", badge: "api" },
      { text: "Fetch live weather by city name", badge: "api" },
      { text: "Map weather conditions to risk multiplier (Clear 1.0x → Snow 2.0x)", badge: "ml" },
      { text: "Feed risk weight into accident prediction score", badge: "ml" },
      { text: "Display live weather card on dashboard", badge: "ui" },
    ]
  },
  {
    label: "Day 8", color: "#E1F5EE", textColor: "#085041", title: "Emergency Vehicle Detection",
    dates: "Apr 1",
    tasks: [
      { text: "Install ultralytics YOLOv8 nano (yolov8n.pt)", badge: "cv" },
      { text: "Test YOLO on sample traffic video or webcam feed", badge: "cv" },
      { text: "Write ambulance/fire truck detection logic", badge: "cv" },
      { text: "Trigger 'Green Wave' signal override on detection", badge: "cv" },
      { text: "Auto-reset signal to normal after vehicle passes", badge: "cv" },
      { text: "Show emergency alert banner on dashboard", badge: "ui" },
    ]
  },
  {
    label: "Day 9", color: "#FBEAF0", textColor: "#993556", title: "Voice Navigation & Dashboard UI",
    dates: "Apr 2",
    tasks: [
      { text: "Set up pyttsx3 / gTTS for voice output", badge: "ui" },
      { text: "Voice alert: 'High accident risk zone ahead — reduce speed'", badge: "ui" },
      { text: "Voice alert: 'Ambulance approaching — move to left lane'", badge: "ui" },
      { text: "Voice alert: 'Weather risk elevated — fog detected'", badge: "ui" },
      { text: "Build Streamlit dashboard with 5 tabs (one per feature)", badge: "ui" },
      { text: "Add Plotly charts, dark theme, live data widgets", badge: "ui" },
    ]
  },
  {
    label: "Day 10", color: "#FCEBEB", textColor: "#793030", title: "Full System Integration",
    dates: "Apr 3",
    tasks: [
      { text: "Connect all 5 modules into single main.py", badge: null },
      { text: "Test end-to-end flow: weather → prediction → signal → detection → voice", badge: null },
      { text: "Fix integration bugs and slow response times", badge: null },
      { text: "Record 2-minute project demo video", badge: "demo" },
      { text: "Push final code to GitHub", badge: null },
    ]
  },
  {
    label: "Day 11", color: "#F1EFE8", textColor: "#5F5E5A", title: "Report, Slides & Testing",
    dates: "Apr 4",
    tasks: [
      { text: "Complete full project report (problem → solution → results)", badge: "report" },
      { text: "Format references in IEEE style", badge: "report" },
      { text: "Prepare PowerPoint: Problem → Solution → Demo → Results → Future Scope", badge: "report" },
      { text: "Prepare answers: Why Random Forest? Is it real-time? What's novel?", badge: "demo" },
      { text: "Edge case testing: no internet, no webcam, invalid data", badge: null },
      { text: "Dry-run full demo end-to-end", badge: "demo" },
    ]
  },
  {
    label: "Apr 7", color: "#EAF3DE", textColor: "#3B6D11", title: "Competition Day",
    dates: "Apr 7",
    tasks: [
      { text: "Arrive early, set up laptop and dashboard", badge: null },
      { text: "Keep demo video ready as backup", badge: "demo" },
      { text: "Final demo dry run before judges arrive", badge: "demo" },
      { text: "Present confidently — highlight the unified 5-feature system", badge: "demo" },
    ]
  },
];

const badgeClass = { urgent:"badge-urgent", ml:"badge-ml", cv:"badge-cv", ui:"badge-ui", api:"badge-api", report:"badge-report", demo:"badge-demo" };
const badgeLabel = { urgent:"URGENT", ml:"ML", cv:"CV/YOLO", ui:"UI", api:"API", report:"Report", demo:"Demo" };

let checked = {};
try { const s = localStorage.getItem('tc_checked'); if(s) checked = JSON.parse(s); } catch(e){}

function save() { try { localStorage.setItem('tc_checked', JSON.stringify(checked)); } catch(e){} }

function updateStats() {
  let total = 0, done = 0;
  phases.forEach((p,pi) => p.tasks.forEach((_,ti) => { total++; if(checked[pi+'-'+ti]) done++; }));
  document.getElementById('s-done').textContent = done;
  document.getElementById('s-left').textContent = total - done;
  document.getElementById('s-pct').textContent = Math.round(done/total*100)+'%';
  document.getElementById('prog').style.width = Math.round(done/total*100)+'%';
}

const container = document.getElementById('phases');
phases.forEach((phase, pi) => {
  const el = document.createElement('div');
  el.className = 'phase';
  const total = phase.tasks.length;
  const doneCnt = phase.tasks.filter((_,ti) => checked[pi+'-'+ti]).length;

  el.innerHTML = `
    <div class="phase-header" onclick="togglePhase(${pi})">
      <span class="phase-tag" style="background:${phase.color};color:${phase.textColor}">${phase.label}</span>
      <span class="phase-title">${phase.title}</span>
      <span class="phase-meta" id="meta-${pi}">${doneCnt}/${total}</span>
      <span class="phase-chevron" id="chev-${pi}">▼</span>
    </div>
    <div class="phase-body" id="body-${pi}">
      ${phase.tasks.map((t, ti) => `
        <div class="task-row" onclick="toggle(${pi},${ti})">
          <div class="checkbox ${checked[pi+'-'+ti]?'done':''}" id="cb-${pi}-${ti}">
            ${checked[pi+'-'+ti]?'<span class="checkmark">✓</span>':''}
          </div>
          <span class="task-text ${checked[pi+'-'+ti]?'done':''}" id="tt-${pi}-${ti}">${t.text}${t.badge?`<span class="task-badge ${badgeClass[t.badge]}">${badgeLabel[t.badge]}</span>`:''}</span>
        </div>
      `).join('')}
    </div>
  `;
  container.appendChild(el);
});

function togglePhase(pi) {
  const body = document.getElementById('body-'+pi);
  const chev = document.getElementById('chev-'+pi);
  if(body.style.display === 'none') { body.style.display = ''; chev.style.transform = ''; }
  else { body.style.display = 'none'; chev.style.transform = 'rotate(-90deg)'; }
}

function toggle(pi, ti) {
  const key = pi+'-'+ti;
  checked[key] = !checked[key];
  save();
  const cb = document.getElementById('cb-'+pi+'-'+ti);
  const tt = document.getElementById('tt-'+pi+'-'+ti);
  cb.className = 'checkbox' + (checked[key]?' done':'');
  cb.innerHTML = checked[key]?'<span class="checkmark">✓</span>':'';
  tt.className = 'task-text' + (checked[key]?' done':'');
  const p = phases[pi];
  const doneCnt = p.tasks.filter((_,ti2) => checked[pi+'-'+ti2]).length;
  document.getElementById('meta-'+pi).textContent = doneCnt+'/'+p.tasks.length;
  updateStats();
}

updateStats();
</script>
